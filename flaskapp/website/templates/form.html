{% extends "base.html" %}

{% block title %}{{ action }} API Configuration{% endblock %}

{% block content %}
<div class="container">
    <h1>{{ action }} API Configuration</h1>
    
    {% if error %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ error }}
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">×</span>
            </button>
        </div>
    {% endif %}

    <form method="POST" id="api-config-form">
        <div class="form-group">
            <label for="name">Configuration Name</label>
            <input type="text" id="name" name="name" class="form-control" value="{{ config.name if config else '' }}" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-control" rows="3">{{ config.description if config else '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="authorization_name">Authorization</label>
            <select id="authorization_name" name="authorization_name" class="form-control">
                <option value="">None</option>
                {% for connector in connectors %}
                    <option value="{{ connector.name }}" 
                            data-auth-type="{{ connector.auth_type }}" 
                            data-auth-config="{{ connector.auth_config|tojson|safe }}"
                            {% if config and config.authorization_name == connector.name %}selected{% endif %}>
                        {{ connector.name }} ({{ connector.auth_type }})
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="method">HTTP Method</label>
            <select id="method" name="method" class="form-control" required>
                <option value="GET" {% if config and config.method == 'GET' %}selected{% endif %}>GET</option>
                <option value="POST" {% if config and config.method == 'POST' %}selected{% endif %}>POST</option>
                <option value="PUT" {% if config and config.method == 'PUT' %}selected{% endif %}>PUT</option>
                <option value="DELETE" {% if config and config.method == 'DELETE' %}selected{% endif %}>DELETE</option>
            </select>
        </div>

        <div class="form-group">
            <label for="base_url">Base URL</label>
            <input type="url" id="base_url" name="base_url" class="form-control" value="{{ config.base_url if config else '' }}" required>
        </div>

        <div class="form-group">
            <label for="url_path">URL Path</label>
            <input type="text" id="url_path" name="url_path" class="form-control" value="{{ config.url_path if config else '' }}">
        </div>

        <div class="form-group">
            <label for="headers">Headers (JSON)</label>
            <textarea id="headers" name="headers" class="form-control" rows="4">{{ config.headers if config else '{}' }}</textarea>
        </div>

        <div class="form-group">
            <label for="parameters">Parameters (JSON)</label>
            <textarea id="parameters" name="parameters" class="form-control" rows="4">{{ config.parameters if config else '{}' }}</textarea>
        </div>

        <div class="form-group">
            <label for="body">Body (JSON)</label>
            <textarea id="body" name="body" class="form-control" rows="4">{{ config.body if config else '{}' }}</textarea>
        </div>

        <div class="form-group">
            <label for="retries">Retries</label>
            <input type="number" id="retries" name="retries" class="form-control" value="{{ config.retries if config else 3 }}" min="0">
        </div>

        <div class="form-group">
            <label for="delay_response">Delay Response (ms)</label>
            <input type="number" id="delay_response" name="delay_response" class="form-control" value="{{ config.delay_response if config else 0 }}" min="0">
        </div>

        <button type="submit" class="btn btn-primary">{{ action }}</button>
        <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}

{% block javascript %}
{{ super() }}
<script type="text/javascript">
    document.addEventListener('DOMContentLoaded', () => {
        updateHeaders();
    });

    document.getElementById('authorization_name').addEventListener('change', updateHeaders);

    function updateHeaders() {
        const select = document.getElementById('authorization_name');
        const headersTextarea = document.getElementById('headers');
        const selectedOption = select.options[select.selectedIndex];
        
        let headers = {};
        try {
            headers = headersTextarea.value.trim() ? JSON.parse(headersTextarea.value) : {};
        } catch (err) {
            console.warn('Invalid JSON in headers:', err.message);
        }

        // Remove previous Authorization headers
        delete headers['Authorization'];
        if (selectedOption && selectedOption.value) {
            const authType = selectedOption.getAttribute('data-auth-type');
            const authConfig = selectedOption.getAttribute('data-auth-config') ? JSON.parse(selectedOption.getAttribute('data-auth-config')) : {};

            if (authType === 'basic') {
                const username = authConfig.username || '';
                const password = authConfig.password || '';
                if (username && password) {
                    const encoded = btoa(`${username}:${password}`);
                    headers['Authorization'] = `Basic ${encoded}`;
                }
            } else if (authType === 'bearer') {
                const token = authConfig.token || '';
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }
            } else if (authType === 'api_key') {
                const keyName = authConfig.key_name || '';
                const keyValue = authConfig.key_value || '';
                if (keyName && keyValue && !authConfig.in) { // Only for header-based API keys
                    headers[keyName] = keyValue;
                }
            }
        }

        headersTextarea.value = JSON.stringify(headers, null, 2);
    }
</script>
{% endblock %}
